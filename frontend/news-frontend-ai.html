<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Platform — CURRENT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8392b;
    --accent2: #2c5f8a;
    --muted: #7a7068;
    --border: #c9c0b0;
    --card-bg: #faf7f2;
    --panel-bg: #111111;
    --panel-mid: #1a1a1a;
    --panel-border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }

  /* ── HEADER ── */
  header { border-bottom: 3px double var(--border); padding: 0 2rem; background: var(--paper); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 0.5rem; border-bottom: 1px solid var(--border); }
  .dateline { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .masthead { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -0.02em; color: var(--ink); text-align: center; }
  .masthead span { color: var(--accent); }
  .header-actions { display: flex; gap: 0.75rem; align-items: center; }
  .btn { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0.9rem; border: 1px solid var(--border); background: transparent; color: var(--ink); cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: #a02d22; }
  .nav-strip { display: flex; padding: 0.4rem 0; overflow-x: auto; scrollbar-width: none; }
  .nav-strip::-webkit-scrollbar { display: none; }
  .nav-tag { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 1rem; color: var(--muted); cursor: pointer; border: none; background: none; white-space: nowrap; transition: color 0.15s; border-right: 1px solid var(--border); }
  .nav-tag:last-child { border-right: none; }
  .nav-tag:hover, .nav-tag.active { color: var(--accent); }

  /* ── OVERLAY ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* ── SIDE PANEL SHELL ── */
  .side-panel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: var(--panel-bg); color: var(--paper); z-index: 200; transition: right 0.32s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; }
  .side-panel.open { right: 0; }

  /* ── PANEL PAGES (slides left/right) ── */
  .panel-pages { display: flex; width: 200%; flex: 1; transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
  .panel-pages.show-sub { transform: translateX(-50%); }
  .panel-page { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; }

  /* ── MENU PAGE ── */
  .menu-header { padding: 2rem 1.5rem 1.5rem; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; position: relative; }
  .menu-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 1.1rem; cursor: pointer; transition: color 0.15s; line-height: 1; padding: 0.25rem; }
  .menu-close:hover { color: var(--paper); }
  .user-avatar { width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: 0.85rem; }
  .user-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; line-height: 1.2; }
  .user-handle { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.35); margin-top: 0.2rem; letter-spacing: 0.04em; }

  /* stats row */
  .stats-row { display: flex; gap: 0; margin-top: 1.2rem; border: 1px solid var(--panel-border); }
  .stat-item { flex: 1; padding: 0.65rem 0; text-align: center; border-right: 1px solid var(--panel-border); }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--paper); display: block; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); display: block; margin-top: 0.1rem; }

  /* menu items */
  .menu-items { flex: 1; padding: 0.75rem 0; overflow-y: auto; }
  .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--panel-border); }
  .menu-item:hover { background: rgba(255,255,255,0.04); }
  .menu-item-left { display: flex; align-items: center; gap: 0.9rem; }
  .menu-item-icon { width: 36px; height: 36px; border: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .menu-item-text { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; }
  .menu-item-sub { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: rgba(255,255,255,0.3); margin-top: 0.15rem; letter-spacing: 0.04em; }
  .menu-item-arrow { color: rgba(255,255,255,0.25); font-size: 0.9rem; }
  .menu-item:hover .menu-item-arrow { color: rgba(255,255,255,0.6); transform: translateX(2px); transition: all 0.15s; }

  /* sign out */
  .menu-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--panel-border); flex-shrink: 0; }
  .signout-btn { width: 100%; padding: 0.65rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; background: none; border: 1px solid rgba(200,57,43,0.4); color: #e57373; cursor: pointer; transition: all 0.15s; }
  .signout-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── SUB PAGE ── */
  .sub-header { display: flex; align-items: center; gap: 0.75rem; padding: 1.4rem 1.5rem; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
  .back-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 1rem; padding: 0.25rem; transition: color 0.15s; display: flex; align-items: center; gap: 0.35rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.06em; }
  .back-btn:hover { color: var(--paper); }
  .sub-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .sub-body { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }
  .sub-body::-webkit-scrollbar { width: 3px; }
  .sub-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.45rem; }
  .form-group input, .form-group select { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--paper); padding: 0.65rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: #1a1a1a; }
  .form-group input[readonly] { opacity: 0.35; cursor: not-allowed; }
  .form-divider { height: 1px; background: var(--panel-border); margin: 1.5rem 0; }
  .form-section-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 1rem; }
  .inline-msg { font-size: 0.73rem; padding: 0.45rem 0.75rem; margin-top: 0.65rem; border-left: 3px solid var(--accent); background: rgba(200,57,43,0.12); display: none; font-family: 'DM Mono', monospace; letter-spacing: 0.03em; }
  .inline-msg.success { border-color: #66bb6a; background: rgba(102,187,106,0.1); }
  .full-btn { width: 100%; padding: 0.65rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; border: none; }
  .full-btn.dark { background: var(--paper); color: var(--ink); }
  .full-btn.dark:hover { background: var(--cream); }
  .full-btn.outline { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
  .full-btn.outline:hover { border-color: rgba(255,255,255,0.5); color: var(--paper); }

  /* ── ARTICLE LISTS (history / favorites) ── */
  .article-list { display: flex; flex-direction: column; gap: 0; }
  .article-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 0; border-bottom: 1px solid var(--panel-border); transition: background 0.12s; }
  .article-row:last-child { border-bottom: none; }
  .article-row-click { flex: 1; display: flex; gap: 0.8rem; cursor: pointer; align-items: center; min-width: 0; }
  .article-row-click:hover .article-row-title { color: rgba(255,255,255,0.7); }
  .row-thumb { width: 60px; height: 44px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
  .row-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: rgba(255,255,255,0.15); }
  .article-row-body { flex: 1; min-width: 0; }
  .article-row-title { font-family: 'Playfair Display', serif; font-size: 0.83rem; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.12s; }
  .article-row-meta { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-top: 0.25rem; letter-spacing: 0.04em; }
  .unlike-btn { flex-shrink: 0; background: none; border: 1px solid rgba(255,255,255,0.12); color: #e57373; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.15s; }
  .unlike-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .list-empty { text-align: center; padding: 3rem 1rem; }
  .list-empty-icon { font-size: 2.2rem; opacity: 0.25; margin-bottom: 0.75rem; }
  .list-empty-text { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.25); letter-spacing: 0.08em; }

  /* ── AUTH PANEL ── */
  .auth-panel { position: fixed; top: 0; right: -400px; width: 380px; height: 100vh; background: var(--panel-bg); color: var(--paper); z-index: 200; padding: 2rem; transition: right 0.32s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
  .auth-panel.open { right: 0; }
  .auth-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 1.5rem; }
  .auth-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 1.1rem; cursor: pointer; }
  .auth-close:hover { color: var(--paper); }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--panel-border); margin-bottom: 1.5rem; }
  .auth-tab { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.5rem 1rem; cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.4); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .auth-tab.active { color: var(--paper); border-bottom-color: var(--accent); }
  .auth-msg { font-size: 0.75rem; padding: 0.5rem 0.75rem; margin-top: 0.75rem; border-left: 3px solid var(--accent); background: rgba(200,57,43,0.15); display: none; font-family: 'DM Mono', monospace; }
  .auth-msg.success { border-color: #66bb6a; background: rgba(102,187,106,0.12); }

  /* ── MAIN ── */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; animation: fadeUp 0.5s ease both; cursor: pointer; }
  .hero-image { aspect-ratio: 16/10; background: var(--cream); overflow: hidden; }
  .hero-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .hero:hover .hero-image img { transform: scale(1.03); }
  .hero-image .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: var(--border); }
  .hero-content { display: flex; flex-direction: column; justify-content: center; }
  .category-tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1.25; margin-bottom: 1rem; transition: color 0.15s; }
  .hero:hover .hero-title { color: var(--accent2); }
  .hero-desc { font-size: 0.95rem; line-height: 1.7; color: var(--muted); margin-bottom: 1rem; }
  .meta { display: flex; gap: 1rem; align-items: center; font-family: 'DM Mono', monospace; font-size: 0.67rem; color: var(--muted); letter-spacing: 0.05em; }
  .meta .author { color: var(--ink); font-weight: 500; }
  .meta .views::before { content: '👁 '; }
  .section-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .news-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-bottom: 2rem; }
  .news-card { background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s ease; animation: fadeUp 0.4s ease both; }
  .news-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: var(--accent); }
  .card-img { aspect-ratio: 16/9; background: var(--cream); overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .news-card:hover .card-img img { transform: scale(1.05); }
  .card-img .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--border); }
  .card-body { padding: 1rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; line-height: 1.35; margin-bottom: 0.5rem; }
  .card-desc { font-size: 0.8rem; line-height: 1.6; color: var(--muted); margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pagination { display: flex; gap: 0.5rem; justify-content: center; margin: 2rem 0; }
  .page-btn { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; padding: 0.45rem 0.9rem; border: 1px solid var(--border); background: none; cursor: pointer; transition: all 0.15s; color: var(--ink); }
  .page-btn:hover, .page-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn:disabled:hover { background: none; color: var(--ink); border-color: var(--border); }

  /* ── MODAL ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(10,10,10,0.85); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s; display: flex; align-items: flex-start; justify-content: center; padding: 2rem; overflow-y: auto; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--paper); width: 100%; max-width: 720px; padding: 2.5rem; position: relative; transform: translateY(20px); transition: transform 0.25s; margin: auto; }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-close { position: absolute; top: 1rem; right: 1.2rem; font-size: 1.4rem; cursor: pointer; background: none; border: none; color: var(--muted); transition: color 0.15s; }
  .modal-close:hover { color: var(--accent); }
  .modal-category { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 1rem; }
  .modal-img { width: 100%; aspect-ratio: 16/8; object-fit: cover; margin-bottom: 1.2rem; background: var(--cream); }
  .modal-meta { display: flex; gap: 1.5rem; padding: 0.75rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); flex-wrap: wrap; }
  .modal-content { font-size: 0.95rem; line-height: 1.8; color: #2a2520; }
  .modal-content p { margin-bottom: 1rem; }
  .fav-btn { margin-top: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.5rem 1rem; border: 1px solid var(--border); background: none; cursor: pointer; transition: all 0.15s; color: var(--ink); }
  .fav-btn:hover, .fav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .related-section { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  .related-title { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .related-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .related-item { display: flex; gap: 0.75rem; cursor: pointer; padding: 0.5rem; transition: background 0.15s; border: 1px solid transparent; }
  .related-item:hover { background: var(--cream); border-color: var(--border); }
  .related-img { width: 70px; height: 50px; object-fit: cover; flex-shrink: 0; background: var(--cream); }
  .related-item-title { font-family: 'Playfair Display', serif; font-size: 0.85rem; line-height: 1.35; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.05em; padding: 0.6rem 1.2rem; z-index: 500; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; }
  .loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; margin-left: 0.75rem; animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── SEARCH ── */
  .search-bar { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); background: var(--paper); overflow: hidden; transition: border-color 0.15s; }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-input { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.04em; padding: 0.4rem 0.75rem; border: none; background: transparent; color: var(--ink); outline: none; width: 220px; }
  .search-input::placeholder { color: var(--muted); }
  .search-btn { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; padding: 0.4rem 0.75rem; background: var(--ink); color: var(--paper); border: none; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .search-btn:hover { background: var(--accent); }
  .search-clear { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.4rem 0.5rem; background: none; border: none; color: var(--muted); cursor: pointer; display: none; }
  .search-clear:hover { color: var(--accent); }
  .search-results-bar { padding: 0.5rem 0; display: none; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .search-results-bar.visible { display: flex; }
  .search-results-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; }
  .search-results-label strong { color: var(--accent); }
  .search-exit { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; padding: 0.3rem 0.7rem; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .search-exit:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; }
    .news-grid { grid-template-columns: 1fr 1fr; }
    .masthead { font-size: 1.5rem; }
    .side-panel, .auth-panel { width: 100%; right: -100%; }
  }
  @media (max-width: 480px) {
    .news-grid { grid-template-columns: 1fr; }
    main { padding: 1rem; }
    .modal { padding: 1.5rem; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- ── LOGGED-IN SIDE PANEL ── -->
<div class="side-panel" id="sidePanel">
  <div class="panel-pages" id="panelPages">

    <!-- PAGE 1: MENU -->
    <div class="panel-page">
      <div class="menu-header">
        <button class="menu-close" onclick="closeAllPanels()">✕</button>
        <div class="user-avatar" id="menuAvatar">?</div>
        <div class="user-name" id="menuName">—</div>
        <div class="user-handle" id="menuHandle"></div>
        <div class="stats-row" id="statsRow">
          <div class="stat-item"><span class="stat-num" id="statFavs">—</span><span class="stat-label">Saved</span></div>
          <div class="stat-item"><span class="stat-num" id="statHistory">—</span><span class="stat-label">Read</span></div>
        </div>
      </div>

      <div class="menu-items">
        <div class="menu-item" onclick="openSub('profile')">
          <div class="menu-item-left">
            <div class="menu-item-icon">👤</div>
            <div>
              <div class="menu-item-text">Edit Profile</div>
              <div class="menu-item-sub">Name, bio, password</div>
            </div>
          </div>
          <span class="menu-item-arrow">›</span>
        </div>
        <div class="menu-item" onclick="openSub('history')">
          <div class="menu-item-left">
            <div class="menu-item-icon">🕐</div>
            <div>
              <div class="menu-item-text">Reading History</div>
              <div class="menu-item-sub">Last 10 articles</div>
            </div>
          </div>
          <span class="menu-item-arrow">›</span>
        </div>
        <div class="menu-item" onclick="openSub('favorites')">
          <div class="menu-item-left">
            <div class="menu-item-icon">♥</div>
            <div>
              <div class="menu-item-text">Saved Stories</div>
              <div class="menu-item-sub">Your favorites</div>
            </div>
          </div>
          <span class="menu-item-arrow">›</span>
        </div>
      </div>

      <div class="menu-footer">
        <button class="signout-btn" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <!-- PAGE 2: SUB PAGE -->
    <div class="panel-page" id="subPage">
      <div class="sub-header">
        <button class="back-btn" onclick="closeSub()">← Back</button>
        <div class="sub-title" id="subTitle"></div>
      </div>
      <div class="sub-body" id="subBody"></div>
    </div>

  </div>
</div>

<!-- ── AUTH PANEL (not logged in) ── -->
<div class="auth-panel" id="authPanel">
  <button class="auth-close" onclick="closeAllPanels()">✕</button>
  <h2>Account</h2>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
    <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
  </div>
  <div id="loginForm">
    <div class="form-group"><label>Username</label><input type="text" id="loginUser" placeholder="your username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="full-btn dark" onclick="doLogin()">SIGN IN</button>
    <div class="auth-msg" id="loginMsg"></div>
  </div>
  <div id="registerForm" style="display:none">
    <div class="form-group"><label>Username</label><input type="text" id="regUser" placeholder="choose a username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="min. 6 characters" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <button class="full-btn dark" onclick="doRegister()">CREATE ACCOUNT</button>
    <div class="auth-msg" id="registerMsg"></div>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="header-top">
    <div class="dateline" id="dateline"></div>
    <div class="masthead">CURRENT<span>.</span></div>
    <div class="header-actions">
      <div class="search-bar">
        <input class="search-input" id="searchInput" type="text" placeholder="Search stories…" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear">✕</button>
        <button class="search-btn" onclick="doSearch()">SEARCH</button>
      </div>
      <button class="btn" id="authBtn" onclick="openPanel()">SIGN IN</button>
    </div>
  </div>
  <div class="nav-strip" id="navStrip">
    <div style="padding:0.5rem 1rem;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">loading…</div>
  </div>
</header>

<main>
  <div id="heroArea"></div>
  <div class="search-results-bar" id="searchResultsBar">
    <span class="search-results-label" id="searchResultsLabel"></span>
    <button class="search-exit" onclick="clearSearch()">✕ CLEAR SEARCH</button>
  </div>
  <div class="section-header" id="sectionHeader">
    <span class="section-title">Latest Stories</span>
    <div class="section-line"></div>
    <span style="font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted)" id="totalCount"></span>
  </div>
  <div id="newsGrid" class="news-grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="modal-backdrop" id="modalBackdrop" onclick="handleModalClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('news_token') || null;
let currentUser = JSON.parse(localStorage.getItem('news_user') || 'null');
let currentCategory = null, currentPage = 1, totalNews = 0;
const PAGE_SIZE = 9;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateline').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  updateAuthUI();
  loadCategories();
});

async function api(path, opts={}) {
  const headers = {...(opts.headers||{})};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  // Only set Content-Type for requests with a body.
  if (opts.body) headers['Content-Type'] = 'application/json';
  try {
    const res = await fetch(API+path, {...opts, headers});
    return await res.json();
  } catch(err) {
    showToast('Network error — check your connection');
    return {code: 0, message: 'Network error', data: null};
  }
}

// ── CATEGORIES ───────────────────────────────────────────
async function loadCategories() {
  const data = await api('/api/news/categories');
  const strip = document.getElementById('navStrip');
  strip.innerHTML = '';
  if (!data.data?.length) { strip.innerHTML='<div style="padding:0.5rem 1rem;font-family:\'DM Mono\',monospace;font-size:0.7rem;color:var(--muted)">No categories yet</div>'; return; }
  data.data.forEach((cat,i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tag'+(i===0?' active':'');
    btn.textContent = cat.name.toUpperCase();
    btn.onclick = () => selectCategory(cat,btn);
    strip.appendChild(btn);
  });
  selectCategory(data.data[0], strip.querySelector('.nav-tag'));
}

function selectCategory(cat,el) {
  document.querySelectorAll('.nav-tag').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentCategory=cat; currentPage=1; loadNews();
}

// ── NEWS LIST ────────────────────────────────────────────
async function loadNews() {
  const grid=document.getElementById('newsGrid'), heroArea=document.getElementById('heroArea');
  grid.innerHTML='<div class="loading" style="grid-column:1/-1">Fetching stories</div>';
  heroArea.innerHTML='';
  const data = await api(`/api/news/list?categoryId=${currentCategory.id}&page=${currentPage}&pageSize=${PAGE_SIZE}`);
  const items=data.data?.list||[]; totalNews=data.data?.total||0;
  document.getElementById('totalCount').textContent = totalNews?`${totalNews} STORIES`:'';
  if (!items.length) {
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:4rem;font-family:&quot;Playfair Display&quot;,serif;font-size:1.2rem;color:var(--muted)">No stories yet.</div>';
    document.getElementById('pagination').innerHTML=''; return;
  }
  const h=items[0];
  heroArea.innerHTML=`<div class="hero" onclick="openArticle(${h.id})">
    <div class="hero-image">${h.image?`<img src="${h.image}" onerror="this.parentElement.innerHTML='<div class=no-img>📰</div>'">`:'<div class="no-img">📰</div>'}</div>
    <div class="hero-content">
      <div class="category-tag">● ${esc(currentCategory.name)}</div>
      <div class="hero-title">${esc(h.title)}</div>
      <p class="hero-desc">${esc(h.description||'')}</p>
      <div class="meta"><span class="author">${esc(h.author||'Staff Reporter')}</span><span>${formatDate(h.publishTime)}</span><span class="views">${(h.views||0).toLocaleString()}</span></div>
    </div></div>`;
  grid.innerHTML=items.slice(1).map((item,i)=>`
    <div class="news-card" onclick="openArticle(${item.id})" style="animation-delay:${i*0.05}s">
      <div class="card-img">${item.image?`<img src="${item.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>📰</div>'">`:'<div class="no-img">📰</div>'}</div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-desc">${esc(item.description||'')}</div>
        <div class="meta"><span class="author">${esc(item.author||'Staff')}</span><span>${formatDate(item.publishTime)}</span><span class="views">${(item.views||0).toLocaleString()}</span></div>
      </div></div>`).join('');
  renderPagination();
}

function renderPagination() {
  const total=Math.ceil(totalNews/PAGE_SIZE);
  if(total<=1){document.getElementById('pagination').innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← PREV</button>`;
  for(let p=Math.max(1,currentPage-2);p<=Math.min(total,currentPage+2);p++) html+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>NEXT →</button>`;
  document.getElementById('pagination').innerHTML=html;
}
function goPage(p){currentPage=p;window.scrollTo({top:0,behavior:'smooth'});loadNews();}

// ── ARTICLE MODAL ────────────────────────────────────────
async function openArticle(id) {
  document.getElementById('modalBody').innerHTML='<div class="loading">Loading article</div>';
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
  const data=await api(`/api/news/detail?id=${id}`);
  const a=data.data; if(!a){closeModal();return;}
  if(token) api('/api/history/add',{method:'POST',body:JSON.stringify({newsId:id})}).catch(()=>{});
  let isFav=false;
  if(token){const fd=await api(`/api/favorite/check?newsId=${id}`);isFav=fd.data?.isFavorite||false;}
  const doc=new DOMParser().parseFromString(a.content||'','text/html');
  const paras=doc.body.innerText.split(/\n+/).filter(p=>p.trim().length>20).slice(0,8).map(p=>`<p>${esc(p.trim())}</p>`).join('');
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-category">● ${esc(currentCategory?.name||'News')}</div>
    <h2 class="modal-title">${esc(a.title)}</h2>
    ${a.image?`<img class="modal-img" src="${a.image}" onerror="this.style.display='none'">`:'' }
    <div class="modal-meta"><span>By ${esc(a.author||'Staff Reporter')}</span><span>${formatDate(a.publishTime)}</span><span>👁 ${(a.views||0).toLocaleString()} views</span></div>
    <div class="modal-content">${paras||`<p>${esc(a.description||'No content available.')}</p>`}</div>
    ${token?`<button class="fav-btn ${isFav?'active':''}" id="favBtn" onclick="toggleFav(${id})">${isFav?'♥ SAVED':'♡ SAVE STORY'}</button>`:''}
    <div class="related-section"><div class="related-title">Related Stories</div><div class="related-list" id="relatedList"><div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);padding:0.5rem 0">Loading…</div></div></div>`;
  // Load AI-powered related articles asynchronously
  loadRelated(id);
}
function handleModalClick(e){if(e.target===document.getElementById('modalBackdrop'))closeModal();}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('open');document.body.style.overflow='';}

async function toggleFav(newsId){
  if(!token){showToast('Sign in to save stories');return;}
  const btn=document.getElementById('favBtn'),isFav=btn.classList.contains('active');
  await api(isFav?`/api/favorite/remove?newsId=${newsId}`:'/api/favorite/add',{method:isFav?'DELETE':'POST',body:isFav?undefined:JSON.stringify({newsId})});
  btn.classList.toggle('active');
  btn.innerHTML=btn.classList.contains('active')?'♥ SAVED':'♡ SAVE STORY';
  showToast(btn.classList.contains('active')?'Story saved':'Removed from saved');
}

// ── PANEL OPEN/CLOSE ─────────────────────────────────────
function openPanel(){
  if(currentUser&&token){
    renderMenuHeader();
    loadStats();
    document.getElementById('sidePanel').classList.add('open');
  } else {
    document.getElementById('authPanel').classList.add('open');
  }
  document.getElementById('overlay').classList.add('active');
}

function closeAllPanels(){
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('authPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  closeSub();
}

// ── MENU HEADER ──────────────────────────────────────────
function renderMenuHeader(){
  const name = currentUser?.nickname||currentUser?.username||'';
  document.getElementById('menuAvatar').textContent = (name.charAt(0)||'?').toUpperCase();
  document.getElementById('menuName').textContent = name;
  document.getElementById('menuHandle').textContent = '@'+(currentUser?.username||'');
}

async function loadStats(){
  // fetch latest counts
  const [favData, histData] = await Promise.all([
    api('/api/favorite/list?page=1&pageSize=1'),
    api('/api/history/list?page=1&pageSize=1'),
  ]);
  document.getElementById('statFavs').textContent = favData.data?.total ?? '—';
  document.getElementById('statHistory').textContent = histData.data?.total ?? '—';
}

// ── SUB PAGE NAV ─────────────────────────────────────────
function openSub(page){
  document.getElementById('panelPages').classList.add('show-sub');
  const titles = {profile:'Edit Profile', history:'Reading History', favorites:'Saved Stories'};
  document.getElementById('subTitle').textContent = titles[page]||'';
  const body = document.getElementById('subBody');
  if(page==='profile') renderProfileForm(body);
  else if(page==='history') renderHistoryPage(body);
  else if(page==='favorites') renderFavoritesPage(body);
}

function closeSub(){
  document.getElementById('panelPages').classList.remove('show-sub');
}

// ── PROFILE ──────────────────────────────────────────────
function renderProfileForm(body){
  body.innerHTML=`
    <div class="form-group"><label>Username (read only)</label><input type="text" id="profUsername" readonly value="${esc(currentUser?.username||'')}"></div>
    <div class="form-group"><label>Display Name</label><input type="text" id="profNickname" placeholder="Your display name" maxlength="50" value="${esc(currentUser?.nickname||'')}"></div>
    <div class="form-group"><label>Bio</label><input type="text" id="profBio" placeholder="A short bio" maxlength="500" value="${esc(currentUser?.bio||'')}"></div>
    <div class="form-group"><label>Gender</label>
      <select id="profGender">
        <option value="unknown" ${(currentUser?.gender||'unknown')==='unknown'?'selected':''}>Prefer not to say</option>
        <option value="male" ${currentUser?.gender==='male'?'selected':''}>Male</option>
        <option value="female" ${currentUser?.gender==='female'?'selected':''}>Female</option>
      </select></div>
    <button class="full-btn dark" onclick="saveProfile()">SAVE CHANGES</button>
    <div class="inline-msg" id="profileMsg"></div>
    <div class="form-divider"></div>
    <p class="form-section-label">Change Password</p>
    <div class="form-group"><label>Current Password</label><input type="password" id="oldPass" placeholder="••••••••"></div>
    <div class="form-group"><label>New Password</label><input type="password" id="newPass" placeholder="min. 6 characters"></div>
    <button class="full-btn outline" onclick="changePassword()">UPDATE PASSWORD</button>
    <div class="inline-msg" id="passMsg"></div>`;

  // Fetch fresh data from server
  api('/api/user/info').then(d=>{
    if(d.code===200){
      currentUser={...currentUser,...d.data};
      localStorage.setItem('news_user',JSON.stringify(currentUser));
      document.getElementById('profNickname').value=currentUser.nickname||'';
      document.getElementById('profBio').value=currentUser.bio||'';
      document.getElementById('profGender').value=currentUser.gender||'unknown';
    }
  });
}

async function saveProfile(){
  const msg=document.getElementById('profileMsg');
  const payload={
    nickname:document.getElementById('profNickname').value.trim()||null,
    bio:document.getElementById('profBio').value.trim()||null,
    gender:document.getElementById('profGender').value,
  };
  const data=await api('/api/user/update',{method:'PUT',body:JSON.stringify(payload)});
  if(data.code===200){
    currentUser={...currentUser,...data.data};
    localStorage.setItem('news_user',JSON.stringify(currentUser));
    updateAuthUI(); renderMenuHeader();
    showInlineMsg(msg,'Changes saved!',true);
  } else { showInlineMsg(msg,data.message||'Failed to save'); }
}

async function changePassword(){
  const msg=document.getElementById('passMsg');
  const oldPassword=document.getElementById('oldPass').value;
  const newPassword=document.getElementById('newPass').value;
  if(!oldPassword||!newPassword){showInlineMsg(msg,'Please fill in both fields');return;}
  if(newPassword.length<6){showInlineMsg(msg,'New password must be at least 6 characters');return;}
  const data=await api('/api/user/password',{method:'PUT',body:JSON.stringify({oldPassword,newPassword})});
  if(data.code===200){
    document.getElementById('oldPass').value='';
    document.getElementById('newPass').value='';
    showInlineMsg(msg,'Password updated!',true);
  } else { showInlineMsg(msg,data.message||'Incorrect current password'); }
}

// ── HISTORY ──────────────────────────────────────────────
async function renderHistoryPage(body){
  body.innerHTML='<div class="list-loading" style="font-family:\'DM Mono\',monospace;font-size:0.72rem;color:rgba(255,255,255,0.3);text-align:center;padding:2rem">Loading…</div>';
  const data=await api('/api/history/list?page=1&pageSize=10');
  const items=data.data?.list||[];
  if(!items.length){
    body.innerHTML='<div class="list-empty"><div class="list-empty-icon">🕐</div><div class="list-empty-text">No reading history yet</div></div>';
    return;
  }
  body.innerHTML=`<div class="article-list">${items.map(item=>`
    <div class="article-row">
      <div class="article-row-click" onclick="closeAllPanels();setTimeout(()=>openArticle(${item.id}),300)">
        ${item.image?`<img class="row-thumb" src="${item.image}" onerror="this.className='row-thumb placeholder';this.textContent='📰'">`:
          '<div class="row-thumb placeholder">📰</div>'}
        <div class="article-row-body">
          <div class="article-row-title">${esc(item.title)}</div>
          <div class="article-row-meta">Viewed ${formatDate(item.viewTime)}</div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

// ── FAVORITES ────────────────────────────────────────────
async function renderFavoritesPage(body){
  body.innerHTML='<div class="list-loading" style="font-family:\'DM Mono\',monospace;font-size:0.72rem;color:rgba(255,255,255,0.3);text-align:center;padding:2rem">Loading…</div>';
  const data=await api('/api/favorite/list?page=1&pageSize=20');
  const items=data.data?.list||[];
  if(!items.length){
    body.innerHTML='<div class="list-empty"><div class="list-empty-icon">♡</div><div class="list-empty-text">No saved stories yet</div></div>';
    return;
  }
  body.innerHTML=`<div class="article-list">${items.map(item=>`
    <div class="article-row" id="fav-row-${item.favoriteId}">
      <div class="article-row-click" onclick="closeAllPanels();setTimeout(()=>openArticle(${item.id}),300)">
        ${item.image?`<img class="row-thumb" src="${item.image}" onerror="this.className='row-thumb placeholder';this.textContent='📰'">`:
          '<div class="row-thumb placeholder">📰</div>'}
        <div class="article-row-body">
          <div class="article-row-title">${esc(item.title)}</div>
          <div class="article-row-meta">Saved ${formatDate(item.favoriteTime)}</div>
        </div>
      </div>
      <button class="unlike-btn" title="Remove" onclick="removeFav(${item.id},${item.favoriteId})">♥</button>
    </div>`).join('')}</div>`;
}

async function removeFav(newsId,favId){
  await api(`/api/favorite/remove?newsId=${newsId}`,{method:'DELETE'});
  const row=document.getElementById(`fav-row-${favId}`);
  if(row){row.style.cssText='transition:opacity .22s,transform .22s;opacity:0;transform:translateX(16px)';setTimeout(()=>row.remove(),240);}
  showToast('Removed from saved');
  // update stat count
  const el=document.getElementById('statFavs');
  if(el&&el.textContent!=='—') el.textContent=Math.max(0,parseInt(el.textContent)-1);
}

// ── AUTH ─────────────────────────────────────────────────
function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
}

async function doLogin(){
  const username=document.getElementById('loginUser').value.trim(), password=document.getElementById('loginPass').value;
  const msg=document.getElementById('loginMsg');
  if(!username||!password){showAuthMsg(msg,'Please fill in all fields');return;}
  const data=await api('/api/user/login',{method:'POST',body:JSON.stringify({username,password})});
  if(data.code===200){
    token=data.data.token; currentUser=data.data.userInfo;
    localStorage.setItem('news_token',token); localStorage.setItem('news_user',JSON.stringify(currentUser));
    updateAuthUI(); showAuthMsg(msg,'Welcome back!',true);
    setTimeout(closeAllPanels,600); showToast('Signed in successfully');
  } else { showAuthMsg(msg,data.message||'Login failed'); }
}

async function doRegister(){
  const username=document.getElementById('regUser').value.trim(), password=document.getElementById('regPass').value;
  const msg=document.getElementById('registerMsg');
  if(!username||!password){showAuthMsg(msg,'Please fill in all fields');return;}
  if(username.length<3){showAuthMsg(msg,'Username must be at least 3 characters');return;}
  if(password.length<6){showAuthMsg(msg,'Password must be at least 6 characters');return;}
  const data=await api('/api/user/register',{method:'POST',body:JSON.stringify({username,password})});
  if(data.code===200){
    token=data.data.token; currentUser=data.data.userInfo;
    localStorage.setItem('news_token',token); localStorage.setItem('news_user',JSON.stringify(currentUser));
    updateAuthUI(); showAuthMsg(msg,'Account created!',true);
    setTimeout(closeAllPanels,600); showToast('Welcome!');
  } else { showAuthMsg(msg,data.message||'Registration failed'); }
}

function logout(){
  if(token) api('/api/user/logout',{method:'POST'}).catch(()=>{});
  token=null; currentUser=null;
  localStorage.removeItem('news_token'); localStorage.removeItem('news_user');
  updateAuthUI(); closeAllPanels(); showToast('Signed out');
}

function updateAuthUI(){
  document.getElementById('authBtn').textContent=(currentUser?.nickname||currentUser?.username||'SIGN IN').toUpperCase();
}

// ── UTILS ────────────────────────────────────────────────
function showInlineMsg(el,text,success=false){
  el.textContent=text; el.className='inline-msg'+(success?' success':''); el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
}
function showAuthMsg(el,text,success=false){
  el.textContent=text; el.className='auth-msg'+(success?' success':''); el.style.display='block';
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return'';}}

// ── AI SEARCH ────────────────────────────────────────────
let searchMode = false;

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  // Show clear button
  document.getElementById('searchClear').style.display = 'block';

  const grid = document.getElementById('newsGrid');
  const heroArea = document.getElementById('heroArea');
  const resultsBar = document.getElementById('searchResultsBar');
  const sectionHeader = document.getElementById('sectionHeader');

  heroArea.innerHTML = '';
  grid.innerHTML = '<div class="loading" style="grid-column:1/-1">Searching…</div>';
  document.getElementById('pagination').innerHTML = '';
  resultsBar.classList.add('visible');
  document.getElementById('searchResultsLabel').innerHTML = `Searching for <strong>"${esc(q)}"</strong>…`;
  sectionHeader.style.display = 'none';
  searchMode = true;

  const data = await api(`/api/ai/search?q=${encodeURIComponent(q)}&limit=10`);
  const items = data.data?.list || [];

  document.getElementById('searchResultsLabel').innerHTML =
    items.length
      ? `<strong>${items.length}</strong> results for <strong>"${esc(q)}"</strong>`
      : `No results for <strong>"${esc(q)}"</strong>`;

  if (!items.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;font-family:&quot;Playfair Display&quot;,serif;font-size:1.1rem;color:var(--muted)">No matching stories found.</div>';
    return;
  }

  // Show first result as hero
  const h = items[0];
  heroArea.innerHTML = `<div class="hero" onclick="openArticle(${h.id})">
    <div class="hero-image">${h.image ? `<img src="${h.image}" onerror="this.parentElement.innerHTML='<div class=no-img>📰</div>'">` : '<div class="no-img">📰</div>'}</div>
    <div class="hero-content">
      <div class="category-tag">● AI SEARCH RESULT</div>
      <div class="hero-title">${esc(h.title)}</div>
      <p class="hero-desc">${esc(h.description || '')}</p>
      <div class="meta"><span class="author">${esc(h.author || 'Staff Reporter')}</span><span>${formatDate(h.publishTime)}</span><span class="views">${(h.views || 0).toLocaleString()}</span></div>
    </div></div>`;

  grid.innerHTML = items.slice(1).map((item, i) => `
    <div class="news-card" onclick="openArticle(${item.id})" style="animation-delay:${i * 0.05}s">
      <div class="card-img">${item.image ? `<img src="${item.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>📰</div>'">` : '<div class="no-img">📰</div>'}</div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-desc">${esc(item.description || '')}</div>
        <div class="meta"><span class="author">${esc(item.author || 'Staff')}</span><span>${formatDate(item.publishTime)}</span><span class="views">${(item.views || 0).toLocaleString()}</span></div>
      </div></div>`).join('');
}

function clearSearch() {
  searchMode = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResultsBar').classList.remove('visible');
  document.getElementById('sectionHeader').style.display = '';
  currentPage = 1;
  loadNews();
}

// ── AI RELATED ARTICLES ──────────────────────────────────
async function loadRelated(newsId) {
  const container = document.getElementById('relatedList');
  if (!container) return;

  const data = await api(`/api/ai/related?newsId=${newsId}&limit=4`);
  const items = data.data?.list || [];

  if (!items.length) {
    container.innerHTML = '<div style="font-family:&quot;DM Mono&quot;,monospace;font-size:0.65rem;color:var(--muted);padding:0.5rem 0">No related stories found.</div>';
    return;
  }

  container.innerHTML = items.map(r => `
    <div class="related-item" onclick="closeModal();setTimeout(()=>openArticle(${r.id}),200)">
      ${r.image ? `<img class="related-img" src="${r.image}" onerror="this.style.display='none'">` : ''}
      <div class="related-item-title">${esc(r.title)}</div>
    </div>`).join('');
}
</script>
