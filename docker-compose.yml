version: "3.9"

services:
  # ── MySQL ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ainews_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql          # 持久化数据
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql:ro  # 首次自动建表
    ports:
      - "3306:3306"                        # 本地调试用，生产可以注释掉
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainews_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 覆盖 DB_HOST 指向容器内的 db 服务
      DB_HOST: db
      DB_PORT: "3306"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy    # 等 MySQL 健康才启动
    volumes:
      - faiss_data:/app/faiss_index   # FAISS 索引持久化
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
  faiss_data:
